version: '3.9'

services:
  # =====================
  # PostgreSQL
  # =====================
  postgres:
    image: postgres:16-alpine
    container_name: pontocerto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pontocerto
      POSTGRES_PASSWORD: pontocerto123
      POSTGRES_DB: pontocerto_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pontocerto -d pontocerto_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pontocerto_net

  # =====================
  # Redis
  # =====================
  redis:
    image: redis:7-alpine
    container_name: pontocerto-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis123
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "redis123", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pontocerto_net

  # =====================
  # Backend Node.js
  # =====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pontocerto-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: "postgresql://pontocerto:pontocerto123@postgres:5432/pontocerto_db?schema=public"
      REDIS_URL: "redis://:redis123@redis:6379"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      FRONTEND_URL: "http://localhost:5173"
    volumes:
      - backend_logs:/app/logs
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pontocerto_net
    command: >
      sh -c "npx prisma migrate deploy && node src/server.js"

  # =====================
  # Frontend React (build de produção)
  # =====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pontocerto-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pontocerto_net

  # =====================
  # pgAdmin (interface PostgreSQL)
  # =====================
  pgadmin:
    image: dpage/pgadmin4:8
    container_name: pontocerto-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pontocerto.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - pontocerto_net

  # =====================
  # Redis Commander (interface Redis)
  # =====================
  redis-commander:
    image: ghcr.io/joeferner/redis-commander:latest
    container_name: pontocerto-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379:0:redis123"
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - pontocerto_net

# =====================
# Volumes persistentes
# =====================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_logs:
    driver: local
  pgadmin_data:
    driver: local

# =====================
# Rede interna
# =====================
networks:
  pontocerto_net:
    driver: bridge
